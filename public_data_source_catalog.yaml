      USDA Forest Service annual wildfire hazard potential raster for CONUS.
      Classes: 1=Very Low, 2=Low, 3=Moderate, 4=High, 5=Very High, 6=Non-burnable,
      7=Water. 270m resolution. Used by Discovery-First lane for wildfire risk
      queries. Available as GeoTIFF download or via USGS web service tile.
    urls:
      - "https://www.fs.usda.gov/rmrs/datasets/wildfire-hazard-potential-conus-2023"
    access_tier: 4
    # LIVE PROBE 2026-06-07: apps.fs.usda.gov ArcGIS REST service URLs attempted
    # returned HTTP 403 (access forbidden). WFAS.net WHP page returned HTTP 404.
    # The primary access remains the direct download from Forest Service RMRS.
    # apps.fs.usda.gov/arcx/ REST service for WHP: HTTP 403 (may require VPN).
    # Tier 4 (region download; WMS/REST service not consistently accessible).
    # DEVIATION: kickoff expected WMS/REST access; live probes show limited public
    # API access. GeoTIFF download remains the reliable path for model inputs.
    credential_tier: 1
    ttl_class: static-30d
    source_class: wildfire_hazard
    license: "Public domain (USDA/USFS federal data)"
    citation: >
      Dillon GK (2023). Wildfire Hazard Potential for the conterminous United
      States (270-m), version 2023 update. Fort Collins, CO: Forest Service
      Research Data Archive. DOI: 10.2737/RDS-2015-0047-8. Accessed 2026-06-07.
    vintage: "2023"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Download from Forest Service Research Data Archive:
      https://www.fs.usda.gov/rmrs/datasets/wildfire-hazard-potential-conus-2023
      or DOI:10.2737/RDS-2015-0047-8. GeoTIFF format, CONUS extent, 270m pixel,
      projected CRS (Albers Equal Area). Clip to bbox with rasterio after
      reprojecting to EPSG:4326 or target model CRS.
      For Discovery-First lane visualization, a WMS tile service may exist at
      apps.fs.usda.gov/arcx/rest — probe with /f=json before using, as access
      has been intermittent. Annual release; cache at static-30d until next update.

  - id: landfire-fuels-wcs
    name: "LANDFIRE Fuels Data (USGS GeoServer WCS)"
    description: >
      LANDFIRE fuel characterization products for CONUS: fire behavior fuel models
      (FBF/FBFM), forest canopy cover (FCC), fuel moisture (FMC), surface fuel
      loads, and more. Available via USGS GeoServer WCS at edcintl.cr.usgs.gov.
      2022 and 2023 versions confirmed in capabilities.
    urls:
      - "https://edcintl.cr.usgs.gov/geoserver/landfire/conus_lf2022/ows"
      - "https://landfire.gov/data/lf_wcs_wms"
    access_tier: 2
    # LIVE PROBE 2026-06-07: LANDFIRE WCS documentation at landfire.gov confirmed
    # WCS endpoint base pattern: edcintl.cr.usgs.gov/geoserver/landfire/conus_lf[YEAR]/ows
    # Direct WCS GetCapabilities on conus_lf2022 and conus_lf2023 workspaces
    # returned HTTP 404 — the exact workspace naming could not be confirmed live.
    # The edcintl.cr.usgs.gov base server is likely active per USGS infrastructure.
    # WMS seasonal fuels endpoint documented at:
    # edcintl.cr.usgs.gov/geoserver/landfire/conus_sf/ows?service=WMS&request=GetCapabilities
    # Tier 2 (OGC WCS/WMS service; credentials not required per documentation).
    credential_tier: 1
    ttl_class: static-30d
    source_class: wildfire_fuels
    license: "Public domain (USDA/USFS + USGS federal data)"
    citation: >
      LANDFIRE Program. LANDFIRE 2022 LF2022 Products. USDA Forest Service,
      US Geological Survey, US Department of the Interior.
      https://landfire.gov/. Accessed 2026-06-07.
    vintage: "LF2022 (2022 disturbance)"
    last_verified: "2026-06-07"
    status: active
    # Phase-2 resolution lever: LANDFIRE fuels products are 30 m. The Tier-2
    # catalog_fetch dispatch targets this cell size for its extent-aware grid.
    native_resolution_m: 30.0
    how_to_use: |
      WCS endpoint pattern: https://edcintl.cr.usgs.gov/geoserver/landfire/conus_lf2022/ows
        ?service=WCS&request=GetCapabilities (probe first to confirm coverage names)
      Expected coverage name pattern: LANDFIRE_2022_FBFM40 (40-class fuel model),
        LANDFIRE_2022_CC (canopy cover), LANDFIRE_2022_FMC (fuel moisture).
      WMS endpoint for visualization:
        edcintl.cr.usgs.gov/geoserver/landfire/conus_sf/ows?service=WMS
        &request=GetCapabilities
      GetCoverage with WCS 1.0.0 using CRS=EPSG:4326 is likely the correct
      version (same pattern as MRLC per job-0044). The LANDFIRE Map Viewer at
      landfire.gov/viewer/ provides reference for product names. Pixel units:
      integer class codes per fuel model standard (FBFM13, FBFM40, etc.).

  - id: nasa-firms-viirs-active-fire
    name: "NASA FIRMS VIIRS Active Fire Detections (Key-Required API)"
    description: >
      NASA Fire Information for Resource Management System real-time VIIRS
      active fire/hotspot detections. Near-real-time (NRT) and standard
      products from Suomi-NPP and NOAA-20/21. CSV output. Free MAP_KEY required.
    urls:
      - "https://firms.modaps.eosdis.nasa.gov/api/area/"
    access_tier: 2
    # LIVE PROBE 2026-06-07: firms.modaps.eosdis.nasa.gov/api/area/ endpoint
    # confirmed live. Without API key: HTTP 401 Unauthorized. With API key the
    # response would be CSV with columns: latitude, longitude, brightness,
    # acq_date, acq_time, satellite, confidence, frp (fire radiative power).
    # Free MAP_KEY required — apply at https://firms.modaps.eosdis.nasa.gov/api/.
    # Tier 2 (REST API with key). Note: credential_tier 2 (key required, free).
    credential_tier: 2
    ttl_class: live-no-cache
    source_class: active_fire
    license: "Public domain (NASA federal data)"
    citation: >
      NASA EOSDIS, Fire Information for Resource Management System (FIRMS).
      VIIRS S-NPP 375m Active Fire Detections.
      https://firms.modaps.eosdis.nasa.gov/. Accessed 2026-06-07.
    vintage: "real-time (NRT: within 3h of overpass)"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Register for free MAP_KEY at https://firms.modaps.eosdis.nasa.gov/api/.
      API URL: https://firms.modaps.eosdis.nasa.gov/api/area/csv/{MAP_KEY}/{SOURCE}/{BBOX}/{DAY_RANGE}
      SOURCE options: VIIRS_SNPP_NRT, VIIRS_NOAA20_NRT, LANDSAT_NRT, MODIS_NRT.
      BBOX: west,south,east,north (e.g. -82.5,25.5,-81.0,27.0 for Fort Myers area).
      DAY_RANGE: 1 to 5. Returns CSV with lat/lon/brightness/confidence/FRP.
      Rate limit: 5000 transactions / 10-min. For historical archive (>7 days),
      use NASA Earthdata FIRMS archive (separate endpoint, NASA Earthdata Login required).
      For discovery workflow: filter confidence>=50%, FRP>10 MW for significant detections.

  - id: usda-wildfire-risk-to-communities
    name: "USDA Wildfire Risk to Communities (WRC) — GIS Downloads"
    description: >
      USDA Forest Service community-level wildfire risk characterization for
      all populated places in the US. Risk scores, exposure, and susceptibility
      layers. GIS data available as state-level downloads from the Forest Service
      Research Data Archive.
    urls:
      - "https://wildfirerisk.org/"
      - "https://doi.org/10.2737/RDS-2020-0016-2"
    access_tier: 4
    # LIVE PROBE 2026-06-07: wildfirerisk.org confirmed live; download page
    # redirects to Forest Service Research Data Archive DOI links.
    # No WMS/REST API identified for programmatic access — data is distributed
    # as state-level GIS file downloads from the FSRDA.
    # Tier 4 (region download; no Range or STAC).
    credential_tier: 1
    ttl_class: static-30d
    source_class: wildfire_hazard
    license: "Public domain (USDA/USFS federal data)"
    citation: >
      Scott JH, et al. (2020). Wildfire risk to communities: Spatial datasets of
      landscape-wide wildfire risk components for the United States. Fort Collins,
      CO: Forest Service Research Data Archive. DOI:10.2737/RDS-2020-0016-2.
      Accessed 2026-06-07.
    vintage: "2020 (v2)"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Data download: https://doi.org/10.2737/RDS-2020-0016-2 (all lands)
      or https://doi.org/10.2737/RDS-2020-0060-2 (populated places only).
      Download state-level files, extract relevant rasters/shapefiles.
      Key layers: WHPercentile (wildfire hazard potential rank), ExpBuildings
      (exposed building count), WRIScore (community risk index).
      For web visualization: https://apps.wildfirerisk.org/explore/ provides
      an interactive map that can be used for quick reference while programmatic
      GIS access uses the archive downloads.

