# public_data_source_catalog.yaml — v0.1.0
# GRACE-2 Public Data Source Catalog
# Engine-owned per FR-PHC-4 / §F.1.2 (v0.3.18 + v0.3.20 amendments)
# Curated 2026-06-07 — job-0046-research-20260607 (sprint-08 Stage A)
#
# §F.1.1 access-tier key:
#   1 = STAC + COG (STAC catalog + HTTP Range on backend)
#   2 = OGC service (WMS/WCS/WFS — visualization or canonical bytes)
#   3 = Direct HTTPS file + Range support (206 Partial Content)
#   4 = Region-download + local clip (no Range; full-file per region)
#
# §F.1 credential-tier key:
#   1 = key-free public
#   2 = key-required, free
#   3 = paid / commercial
#
# §F.1.2 required fields per entry:
#   id, name, description, urls, access_tier, credential_tier,
#   ttl_class, source_class, license, citation, vintage, last_verified,
#   status, how_to_use
#
# ttl_class values (FR-DC-2): static-30d | semi-static-7d | dynamic-1h | live-no-cache

catalog_version: "0.1.0"
last_updated: "2026-06-07"
curator_job: "job-0046-research-20260607"

entries:

  # ─────────────────────────────────────────────────────────────────
  # DOMAIN: terrain
  # ─────────────────────────────────────────────────────────────────

  - id: usgs-3dep-elevation-image-service
    name: "USGS 3DEP Elevation ImageServer (ArcGIS REST)"
    description: >
      Multi-resolution USGS 3D Elevation Program DEM mosaic, covering the
      conterminous US, Hawaii, and Alaska at resolutions from 1m to 1/3-arc-second
      (10m). Supports on-the-fly raster functions (hillshade, slope, aspect,
      contours) and OGC WMS/WCS interfaces. Data current as of May 2026.
    urls:
      - "https://elevation.nationalmap.gov/arcgis/rest/services/3DEPElevation/ImageServer"
    access_tier: 2
    # LIVE PROBE 2026-06-07: elevation.nationalmap.gov REST endpoint returns valid
    # ArcGIS ImageServer JSON with WMS + WCS capabilities declared. The older
    # index.nationalmap.gov path returns HTTP 404 — use elevation.nationalmap.gov.
    # WCS GetCoverage returns bytes suitable for model inputs (Tier 2, not Tier 3).
    # The /vsicurl/ windowed-read Tier 3 pattern works on individual staged tiles
    # at prd-tnm.s3.amazonaws.com but the tile URL pattern varies by resolution
    # and QQQUAD cell; the ImageServer WCS is the simpler canonical entry point.
    credential_tier: 1
    ttl_class: static-30d
    source_class: dem
    license: "Public domain (US Federal data, USGS)"
    citation: >
      U.S. Geological Survey, 3D Elevation Program (3DEP) Elevation ImageServer.
      Accessed via https://elevation.nationalmap.gov/arcgis/rest/services/3DEPElevation/ImageServer.
    vintage: "2026"
    last_verified: "2026-06-07"
    status: active
    # Phase-2 resolution lever: 3DEP's canonical seamless product is 1/3-arc-sec
    # (~10 m). The Tier-2 catalog_fetch dispatch targets this native cell size
    # for its extent-aware raster grid (was a fixed 1024 px that coarsened large AOIs).
    native_resolution_m: 10.0
    how_to_use: |
      OGC WCS GetCoverage is the canonical model-input path (same lesson as NLCD
      per job-0044). Append ?service=WCS&version=1.0.0&request=GetCoverage&
      Coverage=DEP3Elevation&CRS=EPSG:4326&BBOX=<west>,<south>,<east>,<north>&
      WIDTH=<px>&HEIGHT=<px>&FORMAT=GeoTIFF. Use the ArcGIS REST exportImage
      endpoint for raster functions (hillshade etc.). The service exposes 11+
      raster functions; default band is elevation in meters. WMS layer name is
      "3DEPElevation". Resolution auto-degrades to 1/9-arc-sec (10m) outside
      1m or 1/3-arc-sec coverage areas — check pixel size in response headers.

  - id: copernicus-dem-glo-30-stac
    name: "Copernicus DEM GLO-30 (Microsoft Planetary Computer STAC)"
    description: >
      Global 30-meter digital surface model derived from TanDEM-X radar satellite
      data. Covers the entire Earth (-180 to 180°, -90 to 90°). Cloud-Optimized
      GeoTIFF tiles queryable via STAC. Preferred global DEM when 3DEP coverage
      is absent (international locations, offshore areas).
    urls:
      - "https://planetarycomputer.microsoft.com/api/stac/v1/collections/cop-dem-glo-30"
      - "https://planetarycomputer.microsoft.com/api/stac/v1"
    access_tier: 1
    # LIVE PROBE 2026-06-07: STAC collection cop-dem-glo-30 returns HTTP 200 with
    # valid STAC 1.0.0 collection JSON. GeoParquet item index confirms COG backend.
    # Tier 1 confirmed (STAC + COG).
    credential_tier: 1
    ttl_class: static-30d
    source_class: dem
    license: "Proprietary — Copernicus DEM license (free for most uses; see ESA Mission-specific Annex)"
    citation: >
      European Space Agency (licensor), Sinergise (producer). Copernicus Digital
      Elevation Model (GLO-30). Hosted by Microsoft Planetary Computer.
      DOI: 10.5069/G9028PQB (OpenTopography). Accessed 2026-06-07.
    vintage: "2021-04-22"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Use pystac-client to query: Client.open("https://planetarycomputer.microsoft.com/api/stac/v1")
      then search collection="cop-dem-glo-30" with bbox and datetime. Assets key
      "data" yields the COG href. HTTP Range is supported — use rasterio + GDAL
      /vsicurl/ for windowed reads. Resolution is ~30m GSD. CRS is EPSG:4326.
      Note: the GLO-30 license permits free use including commercial; read the
      Copernicus DEM License Summary before redistribution.

  - id: copernicus-dem-glo-90-stac
    name: "Copernicus DEM GLO-90 (Microsoft Planetary Computer STAC)"
    description: >
      Global 90-meter digital surface model from TanDEM-X. Same coverage and
      provenance as GLO-30 but at coarser resolution — suitable for large-domain
      regional modeling or quick scoping queries.
    urls:
      - "https://planetarycomputer.microsoft.com/api/stac/v1/collections/cop-dem-glo-90"
    access_tier: 1
    # LIVE PROBE 2026-06-07: collection cop-dem-glo-90 returns valid STAC 1.0.0
    # JSON with GeoParquet item index. Tier 1 confirmed.
    credential_tier: 1
    ttl_class: static-30d
    source_class: dem
    license: "Proprietary — Copernicus DEM license (free for most uses)"
    citation: >
      European Space Agency / Sinergise. Copernicus DEM GLO-90.
      Hosted by Microsoft Planetary Computer. Accessed 2026-06-07.
    vintage: "2021-04-22"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Same query pattern as cop-dem-glo-30 (pystac-client + collection ID
      "cop-dem-glo-90"). Asset key "data" → COG href. Use for bbox areas where
      1m/10m/30m coverage is not needed (reduces download volume ~9x vs GLO-30).

  - id: hydrosheds-v1-dem-conditioned
    name: "HydroSHEDS Hydrologically Conditioned DEM v1 (3 arc-second)"
    description: >
      Hydrologically conditioned (sink-filled, stream-burned) DEM derived from
      SRTM at 3 arc-second (~90m) resolution. Available by continent as zipped
      GeoTIFF packages. Key input for watershed delineation and flow routing.
      HydroSHEDS v2 (TanDEM-X derived) is in development as of 2025.
    urls:
      - "https://data.hydrosheds.org/file/hydrosheds-v1-con/na_con_3s.zip"
      - "https://www.hydrosheds.org/hydrosheds-core-downloads"
    access_tier: 4
    # LIVE PROBE 2026-06-07: hydrosheds.org core downloads page confirmed live.
    # Direct download URL pattern: https://data.hydrosheds.org/file/hydrosheds-v1-con/[continent]_con_3s.zip
    # The /vsicurl/ range-read is NOT tested on these ZIPs (compressed ZIPs don't
    # support byte-range reads of internal TIFFs). Must download full ZIP then extract.
    # Tier 4 (region download + local clip). Continental files are ~100–400 MB each.
    credential_tier: 1
    ttl_class: static-30d
    source_class: dem
    license: "HydroSHEDS license (free for scientific, educational, commercial use with attribution)"
    citation: >
      Lehner B, Verdin K, Jarvis A (2008). New global hydrography derived from
      spaceborne elevation data. Eos, 89(10): 93–94.
      Data: https://www.hydrosheds.org. Accessed 2026-06-07.
    vintage: "2008 (SRTM v3.0 base)"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Download the North America conditioned DEM ZIP from
      https://data.hydrosheds.org/file/hydrosheds-v1-con/na_con_3s.zip (approx.
      350 MB). Continent codes: na=North/Central America, sa=South America,
      eu=Europe+Middle East, as=Asia, af=Africa, au=Australasia.
      After extraction, clip with rasterio using bbox in EPSG:4326. CRS is
      EPSG:4326. Used by HydroMT as a hydrostatically-consistent DEM for
      watershed delineation and SFINCS grid setup. Pre-built flow direction
      (DIR) and accumulation (ACC) grids available at same base path with
      pattern [continent]_dir_3s.zip / hyd_[continent]_acc_15s.zip.

