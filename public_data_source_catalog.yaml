    urls:
      - "https://overpass-api.de/api/interpreter"
    access_tier: 2
    # LIVE PROBE 2026-06-07: Overpass API returned valid JSON with 3 hospital
    # features for Fort Myers bbox when queried for amenity=hospital. Generator
    # shows "Overpass API 0.7.62.11". Tier 2 (provider REST API, not STAC/COG).
    credential_tier: 1
    ttl_class: semi-static-7d
    source_class: critical_infrastructure
    license: "ODbL (OpenStreetMap contributors)"
    citation: >
      OpenStreetMap contributors, Overpass API.
      https://overpass-api.de/. Data © OpenStreetMap contributors, ODbL.
      Accessed 2026-06-07.
    vintage: "real-time (updated within minutes of OSM edits)"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      POST or GET to https://overpass-api.de/api/interpreter with Overpass QL.
      For critical infrastructure in a bbox (Fort Myers example):
        [out:json][timeout:30];
        (node[amenity~"hospital|fire_station|school"](26.55,-81.92,26.68,-81.80);
         way[amenity~"hospital|fire_station|school"](26.55,-81.92,26.68,-81.80););
        out body; >; out skel qt;
      For power infrastructure: [power~"substation|line|tower"].
      Rate limit: ~10 req/min. Use overpy (pip install overpy) for Python
      client. Respect rate limits — add timeout=30 to all queries. OSM data
      quality varies by region; urban US coverage is generally excellent.

