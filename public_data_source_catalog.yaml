  - id: nhdplus-hr-nationalmap-mapserver
    name: "NHDPlus High Resolution — USGS National Map MapServer"
    description: >
      Nationally seamless high-resolution hydrographic network: stream reaches,
      catchments, flow surfaces, and value-added attributes. 13 layers including
      flowlines, water bodies, catchments, and WBD HUC12 watershed boundaries.
      Query and download via ArcGIS REST MapServer.
    urls:
      - "https://hydro.nationalmap.gov/arcgis/rest/services/NHDPlus_HR/MapServer"
    access_tier: 2
    # LIVE PROBE 2026-06-07: MapServer root returns ArcGIS REST JSON v11.3 with
    # 13 layers (NHDPlusGage, NetworkNHDFlowline, NHDPlusCatchment, WBDHU12,
    # etc.). Query capability confirmed (JSON/geoJSON/PBF). Note: layer 1 is
    # NHDPlusSink (point type, not flowline) — use layer 0 (NetworkNHDFlowline)
    # for reach queries. Direct bbox queries (geometry param) returned HTTP 400
    # in spot tests — use where clause with spatial_intersect or OID pagination.
    # Data as of October 2022; no real-time update.
    credential_tier: 1
    ttl_class: static-30d
    source_class: river_geometry
    license: "Public domain (US Federal data, USGS)"
    citation: >
      U.S. Geological Survey, NHDPlus High Resolution.
      Accessed via https://hydro.nationalmap.gov/arcgis/rest/services/NHDPlus_HR/MapServer.
      Data current as of October 2022.
    vintage: "2022-10"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Use the ArcGIS REST query interface. Base URL:
      https://hydro.nationalmap.gov/arcgis/rest/services/NHDPlus_HR/MapServer/0/query
      Key layer IDs: 0=NetworkNHDFlowline, 2=NHDPlusCatchment, 12=WBDHU12.
      Use where=1=1 with geometry bbox + inSR=4326 + outSR=4326.
      Response formats: json, geojson, pbf. Max 2000 records per page; use
      resultOffset for pagination. GNIS_NAME and REACHCODE are the key
      identification fields. Download full NHDPlus HR by HUC4 from
      https://www.usgs.gov/national-hydrography/access-national-hydrography-products.

  - id: usgs-nwis-instantaneous-values
    name: "USGS NWIS Instantaneous Values (Streamflow REST API)"
    description: >
      Real-time and historical streamflow, stage, water temperature, and other
      parameters at USGS stream gauge network. Instantaneous values at 15-minute
      intervals. Freely accessible REST JSON service.
    urls:
      - "https://waterservices.usgs.gov/nwis/iv/"
    access_tier: 2
    # LIVE PROBE 2026-06-07: waterservices.usgs.gov/nwis/iv/ returned HTTP 404
    # at the bare root. Parametric query
    # ?format=json&sites=02339500&parameterCd=00060&period=P1D returns valid JSON
    # with site metadata + 15-min time series. Bbox query with bBox param also
    # returns live gauges (1 gauge returned for Fort Myers bbox 26.55-26.68N,
    # -81.92 to -81.80W: WHISKEY CREEK AT FT. MYERS, FL, site 02293230).
    # Access pattern: OGC-like REST with query params — classified as Tier 2
    # (not a standard WMS but a provider REST service; not direct-file Tier 3).
    credential_tier: 1
    ttl_class: live-no-cache
    source_class: streamflow
    license: "Public domain (US Federal data, USGS)"
    citation: >
      U.S. Geological Survey, National Water Information System (NWIS).
      Accessed via https://waterservices.usgs.gov/nwis/iv/. Accessed 2026-06-07.
    vintage: "real-time"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Base URL: https://waterservices.usgs.gov/nwis/iv/
      Key parameters: format=json, sites=<site_number>, bBox=<west,south,east,north>,
      parameterCd=00060 (streamflow ft³/s) | 00065 (stage ft) | 00010 (temp °C),
      period=P1D (last 24h) or startDT/endDT for date range.
      Example (Fort Myers area bbox): ?format=json&bBox=-81.92,26.55,-81.80,26.68
        &parameterCd=00060&period=P1D&siteStatus=active&siteType=ST
      Returns WaterML JSON with site metadata + time series. Provisional data
      tagged with "P" qualifier. Data is real-time; do NOT cache with static-30d.

  - id: noaa-atlas14-pfds
    name: "NOAA Atlas 14 Precipitation Frequency Data Server (PFDS)"
    description: >
      Precipitation frequency estimates (depth and intensity) by return period
      (1 to 1000 years) and duration (5 min to 60 days) for any US location.
      Official source for design-storm return periods used in SFINCS forcing.
      Data returned as structured text/CSV at a point location.
    urls:
      - "https://hdsc.nws.noaa.gov/cgi-bin/hdsc/new/fe_text_mean.csv"
    access_tier: 2
    # LIVE PROBE 2026-06-07: PFDS endpoint returned valid structured text with
    # precipitation depth estimates for Fort Myers (lat=26.62, lon=-81.87).
    # 100-year / 24-hour value: 11.9 inches — consistent with job-0039's
    # lookup_precip_return_period live run (same endpoint, same result).
    # Tier 2 (OGC-like REST, not STAC/COG, not direct-file Range).
    credential_tier: 1
    ttl_class: static-30d
    source_class: precipitation_frequency
    license: "Public domain (NOAA/NWS federal data)"
    citation: >
      NOAA National Weather Service, Hydrometeorological Design Studies Center.
      Precipitation Frequency Data Server (PFDS), NOAA Atlas 14.
      https://hdsc.nws.noaa.gov/pfds/. Accessed 2026-06-07.
    vintage: "2013–2019 (by region)"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Query URL: https://hdsc.nws.noaa.gov/cgi-bin/hdsc/new/fe_text_mean.csv
        ?lat=<lat>&lon=<lon>&data=depth&units=english&series=pf
      Returns structured text with ARI columns (1, 2, 5, 10, 25, 50, 100, 200,
      500, 1000 years) × duration rows (5min, 10min, 15min, 30min, 1hr, 2hr,
      3hr, 6hr, 12hr, 24hr, 48hr, 4day, 7day, 10day, 20day, 30day, 45day, 60day).
      Parse the "100" column + "24-hr" row for design-storm SFINCS forcing.
      Use units=metric for mm. The lookup_precip_return_period tool wraps this
      endpoint and caches at static-30d (design-storm values do not change).

  - id: noaa-co-ops-water-level-api
    name: "NOAA CO-OPS Tides and Currents API"
    description: >
      NOAA Center for Operational Oceanographic Products and Services REST API
      for tide gauge observations: water level, tidal predictions, currents,
      meteorological data. 6-minute interval real-time data. Used for coastal
      storm-surge tidal boundary conditions.
    urls:
      - "https://api.tidesandcurrents.noaa.gov/api/prod/datagetter"
    access_tier: 2
    # LIVE PROBE 2026-06-07: tidesandcurrents.noaa.gov datagetter redirects
    # (HTTP 301) to api.tidesandcurrents.noaa.gov — use the api. subdomain
    # directly. Live response for station 8723214 (Virginia Key, FL) returned
    # valid JSON with 481 6-minute water level records for Jan 1-2 2026.
    # Tier 2 (REST API, not direct-file Tier 3).
    credential_tier: 1
    ttl_class: live-no-cache
    source_class: tide_gauge
    license: "Public domain (NOAA federal data)"
    citation: >
      NOAA Center for Operational Oceanographic Products and Services (CO-OPS).
      Tides and Currents API. https://api.tidesandcurrents.noaa.gov/. Accessed 2026-06-07.
    vintage: "real-time"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Base URL: https://api.tidesandcurrents.noaa.gov/api/prod/datagetter
      Key parameters: product=water_level, station=<STATION_ID>, datum=MLLW,
      begin_date=YYYYMMDD, end_date=YYYYMMDD, time_zone=GMT, units=english|metric,
      format=json. Station IDs: 8723214 (Virginia Key/Miami), 8726667 (Naples FL),
      8726520 (Fort Myers FL), 8727520 (Cedar Key FL). For storm surge: subtract
      predicted tide from observed to get surge residual. Real-time; do not cache.
      Note: the old tidesandcurrents.noaa.gov/api/datagetter URL now permanently
      redirects — update any legacy code to use api.tidesandcurrents.noaa.gov.

  - id: hydrosheds-hydrobasins-na
    name: "HydroSHEDS HydroBASINS Watersheds (North America)"
    description: >
      Global hierarchical watershed polygon dataset derived from HydroSHEDS,
      organized into 12 Pfafstetter levels. Levels 4–8 are most useful for
      regional watershed delineation. Available as shapefile ZIPs by continent
      and level from data.hydrosheds.org.
    urls:
      - "https://data.hydrosheds.org/file/HydroBasins/standard/hybas_na_lev04_v1c.zip"
      - "https://www.hydrosheds.org/products/hydrobasins"
    access_tier: 4
    # LIVE PROBE 2026-06-07: hybas_na_lev04_v1c.zip at data.hydrosheds.org
    # returned a binary ZIP (5.2 MB) with shapefile contents — confirmed live
    # public download. Tier 4 (full-file ZIP, no Range support on ZIPs).
    credential_tier: 1
    ttl_class: static-30d
    source_class: watershed
    license: "HydroSHEDS license (free for scientific, educational, commercial use with attribution)"
    citation: >
      Lehner B, Grill G (2013). Global river hydrography and network routing:
      baseline data and new approaches to study the world's large river systems.
      Hydrological Processes 27(15): 2171–2186.
      Data: https://www.hydrosheds.org/products/hydrobasins. Accessed 2026-06-07.
    vintage: "v1c (2013)"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      URL pattern: https://data.hydrosheds.org/file/HydroBasins/standard/hybas_[continent]_lev[NN]_v1c.zip
      Continent codes: na, sa, eu, as, af, au, ar, gr, si. Levels 04–08 cover
      regional to watershed scale. Download, extract, and use geopandas to
      spatial-join the bbox centroid to find the containing HydroBASIN.
      Standard + customized (with lakes) variants available. CRS: EPSG:4326.

