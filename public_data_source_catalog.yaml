  - id: usgs-earthquake-catalog-comcat
    name: "USGS Earthquake Catalog (ComCat) FDSNWS Event API"
    description: >
      USGS comprehensive earthquake catalog via FDSN Web Service Event API.
      Returns GeoJSON, QuakeML, or CSV. Supports spatial (bbox, radius),
      temporal, and magnitude filters. Key source for historical and near-real-
      time seismic event data.
    urls:
      - "https://earthquake.usgs.gov/fdsnws/event/1/query"
    access_tier: 2
    # LIVE PROBE 2026-06-07: FDSNWS event query returned valid GeoJSON with 5
    # earthquake features for Jan 1-2 2026 with minmagnitude=3.0. Service
    # confirmed live. Tier 2 (REST API with query parameters, not STAC/COG).
    credential_tier: 1
    ttl_class: semi-static-7d
    source_class: earthquake_events
    license: "Public domain (USGS federal data)"
    citation: >
      U.S. Geological Survey, Earthquake Hazards Program.
      Comprehensive Earthquake Catalog (ComCat).
      https://earthquake.usgs.gov/earthquakes/search/. Accessed 2026-06-07.
    vintage: "1900–present (real-time updates)"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Base URL: https://earthquake.usgs.gov/fdsnws/event/1/query
      Parameters: format=geojson|csv|quakeml, starttime=YYYY-MM-DD, endtime=YYYY-MM-DD,
      minmagnitude=3.0, maxdepth=70, minlatitude=, maxlatitude=, minlongitude=,
      maxlongitude=, limit=20000. Example (M3+ within 200km of Fort Myers):
        ?format=geojson&starttime=2020-01-01&endtime=2026-06-07
        &minmagnitude=3.0&latitude=26.62&longitude=-81.87&maxradius=2.0
      GeoJSON properties: mag, place, time (epoch ms), depth (km), magType.
      For historical event research (FR-HEP-2): use as Tier-1 agency source.
      Max 20000 results per query; paginate with orderby=time-asc + offset for
      large time ranges.

  - id: usgs-nshmp-hazard-web-service
    name: "USGS National Seismic Hazard Mapping Program (NSHMP) Hazard API"
    description: >
      USGS NSHMP web service for probabilistic seismic hazard analysis (PSHA).
      Returns hazard curves (PGA and spectral accelerations) at a lat/lon point
      for specified return periods. Supports 2008, 2014, 2014B editions (US48).
      Used by the USGS Unified Hazard Tool and ASCE 7 reference values.
    urls:
      - "https://earthquake.usgs.gov/nshmp-haz-ws/hazard"
    access_tier: 2
    # LIVE PROBE 2026-06-07: hazard-ws root returned usage documentation JSON
    # listing editions E2008, E2014, E2014B for COUS/CEUS/WUS regions.
    # Editions E2018 and E2023 not found on this instance. Parametric query
    # with valid E2014B + vs30=760 + region=COUS returned meaningful error
    # ("No enum constant...E2018R1") confirming the API is live and parsing
    # requests. The Earthquake Hazard Toolbox at earthquake.usgs.gov/nshmp/
    # is the user-facing UI wrapping this API. Tier 2 (REST API, key-free).
    credential_tier: 1
    ttl_class: static-30d
    source_class: seismic_hazard
    license: "Public domain (USGS federal data)"
    citation: >
      U.S. Geological Survey, Earthquake Hazards Program.
      National Seismic Hazard Model Project, NSHMP Web Service.
      https://earthquake.usgs.gov/nshmp-haz-ws/. Accessed 2026-06-07.
    vintage: "2014/2014B/2023 models"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Get usage: https://earthquake.usgs.gov/nshmp-haz-ws/hazard
      Query URL: https://earthquake.usgs.gov/nshmp-haz-ws/hazard/{EDITION}/{IMT}
        ?edition=E2014B&region=COUS&longitude=<lon>&latitude=<lat>
        &imt=PGA&returnperiod=475&vs30=760
      Key editions: E2008 (2008 COUS), E2014 (2014 COUS), E2014B (2014 update).
      IMT values: PGA (peak ground acceleration), SA0P2 (0.2s spectral accel),
      SA1P0 (1.0s). vs30: shear-wave velocity at 30m depth (760=Site Class B/C,
      185=Site Class E). Returns hazard curve as JSON array of [IML, AFE] pairs.
      For the 2023 NSHMP model, use the Earthquake Hazard Toolbox UI at
      https://earthquake.usgs.gov/nshmp/ — the updated model may not yet be
      exposed in the nshmp-haz-ws API endpoint.

  - id: fema-national-risk-index
    name: "FEMA National Risk Index (NRI) — OpenFEMA API"
    description: >
      FEMA multi-hazard risk index for all US counties and census tracts. Covers
      18 natural hazard types including flood, wildfire, hurricane, earthquake,
      tornado, and more. Risk score, expected annual loss (EAL), social vulnerability,
      community resilience components. December 2025 v1.20 data available.
    urls:
      - "https://www.fema.gov/api/open/v2/NriCounty"
      - "https://www.fema.gov/about/openfema/data-sets/national-risk-index-data"
    access_tier: 2
    # LIVE PROBE 2026-06-07: FEMA OpenFEMA NRI API probed via multiple URL
    # patterns — v1 and v2 both returned HTTP 404 at the paths tested.
    # The FEMA website confirms the NRI is available through OpenFEMA API
    # (base: https://www.fema.gov/api/open/) per search results, with December
    # 2025 v1.20 data. Old hazards.fema.gov NRI URL redirects to the RAPT page.
    # Tier 2 inferred (REST API per OpenFEMA documentation); exact endpoint URL
    # needs verification against current OpenFEMA API catalog.
    credential_tier: 1
    ttl_class: static-30d
    source_class: multi_hazard_risk
    license: "Public domain (FEMA federal data)"
    citation: >
      FEMA. National Risk Index for Natural Hazards. December 2025 v1.20.
      https://www.fema.gov/flood-maps/products-tools/national-risk-index.
      Accessed 2026-06-07.
    vintage: "December 2025 (v1.20)"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      OpenFEMA API base: https://www.fema.gov/api/open/
      Probe the dataset catalog: https://www.fema.gov/about/openfema/data-sets
      to find the current NriCounty and NriTract endpoint names.
      Query example (once endpoint confirmed): ?$filter=state eq 'FL'&$top=100
      Fields: COUNTY, STATE, RISK_SCORE, RISK_RATNG, EAL_SCORE, SOVI_SCORE,
      RESL_SCORE plus per-hazard EAL columns (HWAV_EAL_VALT=hurricane EAL,
      RFLD_EAL_VALT=riverine flood EAL, etc.).
      Bulk download as CSV from the FEMA data page is also available and may be
      more reliable than the API for full-state analysis.

