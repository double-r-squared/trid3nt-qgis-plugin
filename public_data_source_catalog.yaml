    how_to_use: |
      Query via pystac-client collection="modis-MCD12Q1-061" (confirm collection ID
      at https://planetarycomputer.microsoft.com/api/stac/v1/collections).
      Asset "LC_Type1" → IGBP classification COG. 17 IGBP classes (1=Evergreen
      Needleleaf, 12=Cropland, 13=Urban, 17=Water). 500m pixel, annual composite.
      Use for large bbox (>10 km²) or international locations where NLCD/ESA
      WorldCover are preferable at higher resolution.

