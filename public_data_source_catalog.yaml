  - id: mrms-qpe-01h-pass2
    name: "NOAA MRMS Multi-Sensor QPE 1-Hour Pass 2 (GRIB2)"
    description: >
      Multi-Radar Multi-Sensor (MRMS) quantitative precipitation estimate at
      1-hour intervals and ~1-km resolution, updated every 2 minutes.
      Pass 2 is the quality-controlled product incorporating gauge corrections.
      Used for real-time rainfall forcing in pluvial flood workflows.
    urls:
      - "https://mrms.ncep.noaa.gov/data/2D/MultiSensor_QPE_01H_Pass2/"
    access_tier: 4
    # LIVE PROBE 2026-06-07: mrms.ncep.noaa.gov/data/2D/MultiSensor_QPE_01H_Pass2/
    # returned HTTP 200 directory listing with ~20 GRIB2.GZ files at 2-min cadence
    # (files from June 6-7, 2026). File pattern:
    # MRMS_MultiSensor_QPE_01H_Pass2_00.00_YYYYMMDD-HHMMSS.grib2.gz
    # A "latest" symlink is provided. This is a direct HTTPS directory —
    # files are ~654KB–1.1MB gzipped GRIB2. No Range header tested (GRIB2 files
    # are not COGs so Range reads are of limited utility). Classified Tier 4
    # (download full GRIB2 per timestamp, then decode with cfgrib/pygrib).
    # Note: nomads.ncep.noaa.gov/pub/data/nccf/com/mrms/prod/ returned HTTP 403.
    credential_tier: 1
    ttl_class: live-no-cache
    source_class: precipitation_qpe
    license: "Public domain (NOAA federal data)"
    citation: >
      NOAA National Severe Storms Laboratory, Multi-Radar/Multi-Sensor (MRMS).
      https://mrms.ncep.noaa.gov/. Accessed 2026-06-07.
    vintage: "real-time"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      List directory: https://mrms.ncep.noaa.gov/data/2D/MultiSensor_QPE_01H_Pass2/
      Parse href links for GRIB2.GZ files. "Latest" symlink gives most recent file.
      Download with requests, decompress with gzip.open(), decode with cfgrib
      (xarray.open_dataset(file, engine="cfgrib")). The QPE field name in GRIB2
      is typically "tp" (total precipitation, mm). CRS is EPSG:4326 lat/lon grid.
      Archive products (older than ~2h) are not available at this path; use
      NCEI archive for historical QPE (separate endpoint, key-required for bulk).
      Other MRMS products at same base path: RadarQualityIndex, PrecipFlag,
      Reflectivity products.

  - id: nexrad-level2-unidata-s3
    name: "NEXRAD Level II Archive — Unidata/NOAA S3 Bucket"
    description: >
      Full-volume NEXRAD Level II base data (reflectivity, velocity, spectrum
      width) for all US WSR-88D sites. Real-time + historical archive. Bucket
      migrated from noaa-nexrad-level2 to unidata-nexrad-level2 effective
      September 2025.
    urls:
      - "s3://unidata-nexrad-level2"
      - "https://unidata-nexrad-level2.s3.amazonaws.com/"
    access_tier: 3
    # LIVE PROBE 2026-06-07: The original noaa-nexrad-level2 S3 bucket URL
    # returned HTTP 403 (deprecated per Unidata migration notice — bucket
    # discontinued Sep 2025). New bucket is unidata-nexrad-level2. File access
    # pattern: s3://unidata-nexrad-level2/YYYY/MM/DD/KSITE/KSITE{YYYYMMDD}_{HHMMSS}_V06
    # Files are ~2-10 MB each. HTTPS direct access supports Range reads (S3 standard).
    # Access via boto3 or s3fs — no authenticated key needed (public bucket).
    # DEVIATION FROM KICKOFF: kickoff listed noaa-nexrad-level2 bucket; the live
    # bucket name changed to unidata-nexrad-level2 in Sep 2025.
    credential_tier: 1
    ttl_class: live-no-cache
    source_class: radar
    license: "Public domain (NOAA federal data)"
    citation: >
      NOAA National Weather Service, NEXRAD Level II Base Data.
      Hosted by Unidata/NSF. s3://unidata-nexrad-level2.
      Legacy bucket noaa-nexrad-level2 deprecated September 2025.
      Accessed 2026-06-07.
    vintage: "real-time + archive (1991–present)"
    last_verified: "2026-06-07"
    status: active
    how_to_use: |
      Access via boto3 or s3fs (no AWS key needed for public bucket):
        import s3fs; fs = s3fs.S3FileSystem(anon=True)
        fs.ls("unidata-nexrad-level2/2022/09/29/KTBW/")
      File naming: KSITE{YYYYMMDD}_{HHMMSS}_V06 (V06 = newest superresolution format).
      Parse with MetPy or PyART:
        from metpy.io import Level2File; f = Level2File(s3_path)
      For QPE derivation, apply Z-R relationship to reflectivity field.
      Do NOT use old noaa-nexrad-level2 bucket — bucket discontinued Sep 2025;
      update all existing code to unidata-nexrad-level2.

  - id: noaa-nhc-atcf-hurdat2
    name: "NOAA NHC ATCF Best-Track (HURDAT2)"
    description: >
      NOAA National Hurricane Center historical Atlantic and Pacific best-track
      database (HURDAT2) with 6-hourly storm positions and intensities from
      1851 (Atlantic) / 1949 (Pacific) to present. Single flat text files
      covering the full record. Also: real-time ATCF advisory files for active
      storms.
    urls:
      - "https://www.nhc.noaa.gov/data/hurdat/hurdat2-1851-2025-02272026.txt"
      - "https://www.nhc.noaa.gov/data/"
    access_tier: 3
    # LIVE PROBE 2026-06-07: NHC data page confirmed live; HURDAT2 files
    # listed as direct HTTPS downloads (6.8 MB Atlantic, 4.0 MB Pacific).
    # A sample historical TCR PDF (Hurricane Ian) downloaded at HTTP 200
    # (6.7 MB PDF). Real-time ATCF advisory files (a-deck, b-deck) accessible
    # at https://ftp.nhc.noaa.gov/atcf/ — the .dat.gz file probe returned
