  - id: nlcd-mrlc-wcs
    name: "NLCD via MRLC GeoServer WCS 1.0.0 (canonical NLCD class integers)"
    description: >
      National Land Cover Database (NLCD) via the Multi-Resolution Land
      Characteristics (MRLC) Consortium GeoServer WCS 1.0.0 GetCoverage.
      Returns canonical NLCD integer class codes (11=Open Water, 21–24=Developed,
      31=Barren, 41–43=Forest, 52=Shrub, 71=Grassland, 81–82=Agriculture,
      90–95=Wetlands). This is the fetch_landcover substrate post-job-0044 hotfix.
    urls:
      - "https://www.mrlc.gov/geoserver/mrlc_download/NLCD_2021_Land_Cover_L48/ows"
    access_tier: 2
    # LIVE PROBE 2026-06-07: WCS 2.0.1 GetCapabilities on mrlc_download workspace
    # returned a valid 825 KB capabilities document. WCS 1.0.0 GetCoverage on
    # mrlc_download:NLCD_2021_Land_Cover_L48 with CRS=EPSG:4326+BBOX+WIDTH+HEIGHT
    # +FORMAT=GeoTIFF returned a 37.9 KB binary TIFF — canonical NLCD integers
    # confirmed by job-0044 evidence (unique values [11,21,22,23,24,31,41,42,43,52,
    # 71,81,82,90,95]). Note: mrlc_display workspace (WMS endpoint used for
    # visualization) exists separately. Use mrlc_download workspace for WCS
    # model-input bytes. WCS 2.0.1 returns GeoServer projection-mapping bug;
    # WCS 1.1.1 fails on sub-pixel bbox; only WCS 1.0.0 works cleanly.
    credential_tier: 1
    ttl_class: static-30d
    source_class: landcover
    license: "Public domain (US Federal data, MRLC/USGS)"
    citation: >
      Multi-Resolution Land Characteristics Consortium (MRLC).
      National Land Cover Database (NLCD) 2021.
      https://www.mrlc.gov/. Accessed 2026-06-07.
    vintage: "2021 (vintages 2001, 2004, 2006, 2008, 2011, 2013, 2016, 2019, 2021)"
    last_verified: "2026-06-07"
    status: active
    # Phase-2 resolution lever: NLCD's native grid is 30 m. The Tier-2
    # catalog_fetch dispatch targets this cell size for its extent-aware grid.
    native_resolution_m: 30.0
    how_to_use: |
      WCS 1.0.0 GetCoverage:
        https://www.mrlc.gov/geoserver/mrlc_download/NLCD_2021_Land_Cover_L48/ows
          ?service=WCS&version=1.0.0&request=GetCoverage
          &Coverage=mrlc_download:NLCD_2021_Land_Cover_L48
          &CRS=EPSG:4326&BBOX=<west>,<south>,<east>,<north>
          &WIDTH=<px>&HEIGHT=<px>&FORMAT=GeoTIFF
      Returns uint8 GeoTIFF with canonical NLCD integers (see manning_mapping.csv
      v1.0.0 for the complete class→Manning's-n mapping). Nodata=255.
      Width/Height: use ceil(bbox_deg / 0.00009) for ~10m pixel size.
      CRITICAL: do NOT use WMS GetMap (mrlc_display workspace) for model inputs —
      it returns palette-encoded indices (1–21), NOT canonical NLCD integers.
      This distinction is the OQ-42 lesson: WMS for visualization, WCS for bytes.
      Vintage year 2021 is the most recent as of 2026-06-07; 2023 Annual NLCD not
      yet available in MRLC GeoServer.

